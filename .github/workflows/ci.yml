# Build matrix for every platform target plus the full test suite.
#
# The Windows/macOS/Android/iOS jobs exist because those toolchains aren't
# available in the usual dev sandbox — CI is where "compiles on every
# platform" is actually enforced. Release signing is intentionally absent
# (Android signs with debug keys for now; iOS builds with --no-codesign).
name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.6"

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # The store/mcp package tests link the host SQLite (see their pubspecs).
      - name: Install system SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: flutter pub get
      # Resolve the sub-packages too: `flutter analyze` covers packages/*,
      # whose dev-deps (package:test) are otherwise unresolved.
      - name: Resolve package deps
        run: |
          dart pub get -C packages/core
          dart pub get -C packages/mcp
          dart pub get -C packages/store
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib packages test
      - run: flutter analyze
      - name: App widget + golden tests
        run: flutter test
      - name: core tests
        working-directory: packages/core
        run: dart test
      - name: mcp tests
        working-directory: packages/mcp
        run: dart test
      - name: store tests
        working-directory: packages/store
        run: dart test

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install desktop build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: day-dial-linux-x64
          path: build/linux/x64/release/bundle/

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: day-dial-web
          path: build/web/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: day-dial-windows-x64
          path: build\windows\x64\runner\Release\

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: day-dial-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
