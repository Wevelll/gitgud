name: day_dial_mcp
description: >-
  MCP tool layer for Day-Dial: consent-gated tool handlers over the shared core,
  plus an in-memory repository. Transport (stdio / Streamable HTTP) is layered
  on top of this. No Flutter.
version: 0.0.1
publish_to: none

environment:
  # >= 3.10 for sqlite3 3.x build hooks, pulled in via day_dial_store.
  sdk: ^3.10.0

dependencies:
  day_dial_core:
    path: ../core
  day_dial_store:
    path: ../store

dev_dependencies:
  test: ^1.25.0

# Same rationale as packages/store: this package's own test runs link the
# host's SQLite (hermetic, offline-friendly); app builds bundle per platform.
hooks:
  user_defines:
    sqlite3:
      source: system
